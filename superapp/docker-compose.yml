version: '3.8'

services:
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  api-gateway:
    build:
      context: ./backend/api-gateway
      dockerfile: ../../devops/dockerfiles/backend.Dockerfile
    ports:
      - "8000:8000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/superapp
    depends_on:
      - mongodb

  auth-service:
    build:
      context: ./backend/shared/auth-service
      dockerfile: ../../devops/dockerfiles/backend.Dockerfile
    ports:
      - "8001:8001"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/superapp
      - SECRET_KEY=super-secret-key
    depends_on:
      - mongodb

  # Add other services as needed...

volumes:
  mongo_data:
